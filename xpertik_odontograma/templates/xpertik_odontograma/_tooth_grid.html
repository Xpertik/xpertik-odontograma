{% load i18n %}
{# Shared tooth-grid partial used by widget.html and widget_readonly.html. #}
{# v0.1.0 renders a clinical dental chart: quadrants split by a midline, each tooth a 5-face cross. #}
{# v0.2.0 will replace the per-face <select> with an interactive SVG selector. #}
{# Expected context: widget.denticion, widget.sections, widget.estados_cara,                    #}
{#                   widget.estados_diente, widget.causas_ausencia, widget.readonly,             #}
{#                   widget.color_unknown.                                                       #}
<div class="xp-odontograma xp-odontograma--{{ widget.denticion }}{% if widget.readonly %} xp-odontograma--readonly{% endif %}"
     data-readonly="{% if widget.readonly %}true{% else %}false{% endif %}"
     data-denticion="{{ widget.denticion }}">
  {% for section in widget.sections %}
    <section class="xp-odontograma__section xp-odontograma__section--{{ section.key }}"
             data-section="{{ section.key }}">
      {% if widget.denticion == "mixta" %}
        <h4 class="xp-odontograma__section-title">{{ section.label }}</h4>
      {% endif %}
      <div class="xp-odontograma__chart xp-odontograma__chart--{{ section.key }}">
        {% for chart_row in section.rows %}
          <div class="xp-odontograma__row xp-odontograma__row--{{ chart_row.key }}"
               data-jaw="{{ chart_row.key }}"
               aria-label="{{ chart_row.label }}">
            <div class="xp-odontograma__half xp-odontograma__half--left">
              {% for row in chart_row.left %}
                {% include "xpertik_odontograma/_tooth_cell.html" with row=row %}
              {% endfor %}
            </div>
            <div class="xp-odontograma__midline" aria-hidden="true"></div>
            <div class="xp-odontograma__half xp-odontograma__half--right">
              {% for row in chart_row.right %}
                {% include "xpertik_odontograma/_tooth_cell.html" with row=row %}
              {% endfor %}
            </div>
          </div>
        {% endfor %}
      </div>
    </section>
  {% endfor %}
</div>
