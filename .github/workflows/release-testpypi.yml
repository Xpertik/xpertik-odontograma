name: release-testpypi

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/xpertik-odontograma/
    permissions:
      id-token: write  # required for OIDC Trusted Publisher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel ships templates and static assets
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          wheels = glob.glob('dist/*.whl')
          assert wheels, 'no wheel produced'
          z = zipfile.ZipFile(wheels[0])
          names = z.namelist()
          missing = []
          if not any('xpertik_odontograma/templates' in n for n in names):
              missing.append('templates')
          if not any('xpertik_odontograma/static' in n for n in names):
              missing.append('static')
          if missing:
              print(f'ERROR: wheel missing: {missing}', file=sys.stderr)
              sys.exit(1)
          print('OK: wheel contains templates and static')
          PY

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
